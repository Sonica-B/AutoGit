name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Package extension
        run: npx @vscode/vsce package --out auto-git-copilot.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-git-copilot-vsix
          path: auto-git-copilot.vsix
