<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 200" width="960" height="200" role="img" aria-labelledby="title desc" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title id="title">How AutoGit-AI works</title>
  <desc id="desc">When you save a file, AutoGit stages the changes, generates an AI commit message, scans the staged diff for secrets, then commits and pushes. The commit is blocked if a secret is found.</desc>

  <rect x="0" y="0" width="960" height="200" rx="14" fill="#1e1e28"/>

  <!-- connectors -->
  <g stroke="#3b3b4a" stroke-width="2" fill="none">
    <line x1="188" y1="92" x2="212" y2="92"/>
    <line x1="360" y1="92" x2="384" y2="92"/>
    <line x1="556" y1="92" x2="580" y2="92"/>
    <line x1="752" y1="92" x2="776" y2="92"/>
  </g>
  <g fill="#3b3b4a">
    <polygon points="212,92 204,88 204,96"/>
    <polygon points="384,92 376,88 376,96"/>
    <polygon points="580,92 572,88 572,96"/>
    <polygon points="776,92 768,88 768,96"/>
  </g>

  <!-- step 1: save -->
  <g>
    <rect x="24" y="56" width="164" height="72" rx="10" fill="#2a2a38" stroke="#3b3b4a"/>
    <text x="106" y="90" text-anchor="middle" fill="#e8e8f0" font-size="17" font-weight="600">Save a file</text>
    <text x="106" y="110" text-anchor="middle" fill="#9a9ab0" font-size="12">debounced</text>
  </g>

  <!-- step 2: stage -->
  <g>
    <rect x="212" y="56" width="148" height="72" rx="10" fill="#2a2a38" stroke="#3b3b4a"/>
    <text x="286" y="90" text-anchor="middle" fill="#e8e8f0" font-size="17" font-weight="600">Stage</text>
    <text x="286" y="110" text-anchor="middle" fill="#9a9ab0" font-size="12">excludes applied</text>
  </g>

  <!-- step 3: AI message -->
  <g>
    <rect x="384" y="56" width="172" height="72" rx="10" fill="#2a2a38" stroke="#3b3b4a"/>
    <text x="470" y="90" text-anchor="middle" fill="#e8e8f0" font-size="17" font-weight="600">AI message</text>
    <text x="470" y="110" text-anchor="middle" fill="#9a9ab0" font-size="12">GitHub Copilot</text>
  </g>

  <!-- step 4: secret scan (the differentiator) -->
  <g>
    <rect x="580" y="52" width="172" height="80" rx="10" fill="#241d22" stroke="#e0574a" stroke-width="2"/>
    <text x="666" y="86" text-anchor="middle" fill="#ff8a7a" font-size="17" font-weight="700">🔒 Secret scan</text>
    <text x="666" y="106" text-anchor="middle" fill="#d59a94" font-size="12">blocks on a leak</text>
  </g>

  <!-- step 5: commit + push -->
  <g>
    <rect x="776" y="56" width="160" height="72" rx="10" fill="#22322a" stroke="#3f7a55"/>
    <text x="856" y="90" text-anchor="middle" fill="#8fe0a8" font-size="17" font-weight="600">Commit + Push</text>
    <text x="856" y="110" text-anchor="middle" fill="#8aa694" font-size="12">optional push</text>
  </g>

  <text x="480" y="172" text-anchor="middle" fill="#6f6f86" font-size="13">Automatic on every save — no secret ever reaches your remote.</text>
</svg>
